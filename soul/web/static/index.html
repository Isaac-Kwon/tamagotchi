<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>영혼 다마고치</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #efe7d8;
    --panel-bg: #fffdf8;
    --panel-border: #d8cbb0;
    --ink: #2b2620;
    --muted: #7a7160;
    --accent: #6c8ebf;
    --accent-warn: #b23b3b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  header.banner {
    background: #3a3226;
    color: #f3ead9;
    padding: 8px 16px;
    font-size: 13px;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--panel-border);
    font-size: 13px;
    color: var(--muted);
    gap: 12px;
    flex-wrap: wrap;
  }

  #status-bar { flex: 1; min-width: 200px; }
  #conn-status { white-space: nowrap; }

  .layout {
    display: flex;
    height: calc(100vh - 88px);
    min-height: 480px;
  }

  #game-container {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12px;
    overflow: auto;
    background: var(--bg);
  }

  #panels-root {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-width: 320px;
    border-left: 1px solid var(--panel-border);
    background: var(--panel-bg);
    overflow: hidden;
  }

  .panel-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 6px 6px 0 6px;
    border-bottom: 1px solid var(--panel-border);
    background: #f6f0e2;
  }

  .panel-tab {
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    padding: 6px 10px;
    font-size: 12.5px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    color: var(--muted);
  }
  .panel-tab.active {
    background: var(--panel-bg);
    border-color: var(--panel-border);
    color: var(--ink);
    font-weight: 600;
  }

  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }

  .panel-section { display: none; }
  .panel-section.active { display: block; }

  .panel-section h3 { margin: 14px 0 6px; font-size: 14px; }
  .panel-section h3:first-child { margin-top: 0; }
  .panel-section h4 { margin: 10px 0 4px; font-size: 13px; }

  .panel-note {
    font-size: 12.5px;
    color: var(--muted);
    background: #f6f0e2;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 8px 10px;
    margin: 6px 0;
  }

  .panel-empty {
    font-size: 12.5px;
    color: var(--muted);
    font-style: italic;
    padding: 8px 0;
  }

  pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-family: "Consolas", "Menlo", monospace;
    font-size: 12px;
    background: #faf6ec;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 10px;
    max-height: 320px;
    overflow-y: auto;
  }

  .soul-history { display: flex; flex-direction: column; gap: 4px; }
  .soul-commit {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    padding: 5px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    cursor: pointer;
    background: #fff;
  }
  .soul-commit:hover { background: #f0ead9; }
  .soul-commit-msg { flex: 1; }
  .soul-commit-ts { color: var(--muted); white-space: nowrap; }

  .sub-tabs { display: flex; gap: 6px; margin: 8px 0; }
  .sub-tab {
    border: 1px solid var(--panel-border);
    background: #fff;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 5px;
    cursor: pointer;
  }
  .sub-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .step-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--muted); }

  .transcript-entry {
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .transcript-role {
    background: #f0ead9;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    color: var(--muted);
  }
  .transcript-content { margin: 0; border: none; border-radius: 0; max-height: 200px; }

  .wiki-search-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .wiki-search-input { flex: 1; padding: 5px 8px; border: 1px solid var(--panel-border); border-radius: 5px; }
  .wiki-results { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .wiki-result-row {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 6px 8px;
    cursor: pointer;
    background: #fff;
    font-size: 12.5px;
  }
  .wiki-result-row:hover { background: #f0ead9; }
  .wiki-result-title { font-weight: 600; }
  .wiki-result-snippet { color: var(--muted); font-size: 11.5px; }
  .wiki-graph-toggle {
    border: 1px solid var(--panel-border);
    background: #fff;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .wiki-graph-canvas { border: 1px solid var(--panel-border); border-radius: 6px; background: #fff; margin-bottom: 10px; max-width: 100%; }
  .wiki-page-content { max-height: 260px; }
  .wiki-backlinks-label { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .wiki-backlinks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .wiki-backlink {
    background: #eef2fa;
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11.5px;
    cursor: pointer;
  }

  .report-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .report-row {
    border: 1px solid var(--panel-border);
    background: #fff;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12.5px;
  }
  .report-row:hover { background: #f0ead9; }

  .chat-record-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-top: 4px; }
  .chat-record-hint { font-size: 11.5px; color: var(--muted); margin: 4px 0 10px; }
  .chat-log {
    height: 220px;
    overflow-y: auto;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    padding: 8px;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .chat-line { margin-bottom: 6px; }
  .chat-line-me { color: var(--ink); }
  .chat-line-them { color: var(--accent); }
  .chat-input-row { display: flex; gap: 6px; }
  .chat-input { flex: 1; padding: 6px 8px; border: 1px solid var(--panel-border); border-radius: 5px; }
  .chat-end-btn { background: #f6e0e0; }

  .inbox-content, .inbox-url {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    margin: 6px 0;
    font-family: inherit;
  }

  .outbox-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
  .outbox-controls select { margin-bottom: 0; }
  .outbox-list { display: flex; flex-direction: column; gap: 8px; }
  .outbox-row {
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    padding: 8px 10px;
    font-size: 12.5px;
  }
  .outbox-row-head { display: flex; align-items: flex-start; gap: 8px; }
  .outbox-text { flex: 1; word-break: break-word; }
  .outbox-meta { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .outbox-status {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .outbox-status-open { background: #eef2fa; color: var(--accent); }
  .outbox-status-resolved { background: #e5f2e5; color: #3c7a3c; }
  .outbox-status-declined { background: #f6e0e0; color: var(--accent-warn); }
  .outbox-status-ignored { background: #ece7db; color: var(--muted); }
  .outbox-resolve-form { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .outbox-note-input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    font-family: inherit;
    font-size: 12.5px;
  }
  .outbox-actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .outbox-actions button { padding: 5px 10px; }
  .outbox-btn-decline { background: #f6e0e0; color: var(--accent-warn); }
  .outbox-btn-ignore, .outbox-btn-attach { background: #fff; color: var(--muted); }
  .outbox-file-input { font-size: 11.5px; }
  .outbox-detail { margin-top: 6px; font-size: 12px; }
  .outbox-attachment { margin-top: 4px; font-size: 11.5px; color: var(--accent); word-break: break-all; }
  .outbox-row-status { font-size: 11.5px; color: var(--muted); }

  .revealed-note {
    font-size: 12.5px;
    background: #f6f0e2;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .revealed-thread {
    display: flex;
    gap: 12px;
    font-size: 12.5px;
    padding: 6px 8px;
    border-bottom: 1px solid var(--panel-border);
  }
  .revealed-thread-topic { flex: 1; font-weight: 600; }

  /* ---- 통계 패널 (stats) ---- */
  :root {
    --viz-bar: #4a7dbf;      /* single-hue magnitude bars */
    --viz-pos: #4a7dbf;      /* mood valence: positive */
    --viz-neu: #b08a3e;      /* mood valence: neutral  */
    --viz-neg: #b23b3b;      /* mood valence: negative */
  }
  .stat-tiles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .stat-tile {
    flex: 1 1 90px;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    padding: 8px 10px;
    text-align: center;
  }
  .stat-tile-num { font-size: 20px; font-weight: 700; }
  .stat-tile-label { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  .rhythm-strip {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 96px;
    padding: 6px 8px 0 8px;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    overflow-x: auto;
  }
  .rhythm-bar {
    flex: 0 0 5px;
    border-radius: 2px 2px 0 0;
    cursor: pointer;
    min-height: 3px;
  }
  .rhythm-bar:hover { filter: brightness(1.25); }
  .rhythm-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11.5px; color: var(--muted); margin: 6px 0 2px; }
  .legend-swatch {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: baseline;
  }

  .hbar-list { display: flex; flex-direction: column; gap: 5px; margin: 4px 0 8px; }
  .hbar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .hbar-label { flex: 0 0 150px; text-align: right; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hbar-track { flex: 1; background: #f6f0e2; border-radius: 4px; height: 12px; overflow: hidden; }
  .hbar-fill { background: var(--viz-bar); height: 100%; border-radius: 0 4px 4px 0; min-width: 2px; }
  .hbar-value { flex: 0 0 80px; color: var(--muted); font-size: 11.5px; }

  .hist { display: flex; align-items: flex-end; gap: 4px; height: 90px; padding: 4px 2px 0; }
  .hist-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .hist-count { font-size: 10.5px; color: var(--muted); margin-bottom: 2px; }
  .hist-bar { width: 70%; max-width: 26px; background: var(--viz-bar); border-radius: 3px 3px 0 0; }
  .hist-ticks { display: flex; gap: 4px; border-top: 1px solid var(--panel-border); margin-top: 2px; padding-top: 2px; }
  .hist-tick { flex: 1; text-align: center; font-size: 10.5px; color: var(--muted); }

  .thread-list { display: flex; flex-direction: column; gap: 6px; }
  .thread-row {
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    padding: 6px 8px;
    font-size: 12px;
  }
  .thread-topic { font-weight: 600; margin-bottom: 3px; word-break: break-word; }
  .thread-track { background: #f6f0e2; border-radius: 4px; height: 10px; overflow: hidden; margin-bottom: 3px; }
  .thread-fill { background: var(--viz-bar); height: 100%; border-radius: 0 4px 4px 0; min-width: 3px; }
  .thread-meta { color: var(--muted); font-size: 11px; }

  .error-list { display: flex; flex-direction: column; gap: 5px; }
  .error-row {
    border: 1px solid #e4c2c2;
    border-radius: 6px;
    background: #fbf1f1;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .error-row:hover { background: #f6e3e3; }
  .error-row-head { display: flex; gap: 8px; color: var(--accent-warn); font-weight: 600; }
  .error-row-ts { margin-left: auto; color: var(--muted); font-weight: 400; }
  .error-row-msg { color: var(--ink); margin-top: 2px; word-break: break-word; }

  /* ---- 스킬 패널 ---- */
  .skill-list { display: flex; flex-direction: column; gap: 8px; }
  .skill-card {
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    padding: 8px 10px;
    font-size: 12.5px;
  }
  .skill-card.skill-disabled { background: #f3efe6; color: var(--muted); }
  .skill-head { display: flex; align-items: center; gap: 8px; }
  .skill-name { font-weight: 700; font-family: "Consolas", "Menlo", monospace; }
  .skill-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin-left: auto;
  }
  .skill-badge-on { background: #e5f2e5; color: #3c7a3c; }
  .skill-badge-off { background: #f6e0e0; color: var(--accent-warn); }
  .skill-desc { margin: 4px 0; }
  .skill-meta { font-size: 11.5px; color: var(--muted); }
  .skill-fail-warn { color: var(--accent-warn); font-weight: 600; }

  .journal-error-chip {
    background: #f6e0e0;
    color: var(--accent-warn);
    padding: 0 6px;
    border-radius: 8px;
    font-size: 10.5px;
    font-weight: 600;
  }
  .step-error-note {
    color: var(--accent-warn);
    font-size: 12px;
    margin-top: 4px;
  }

  .journal-list { display: flex; flex-direction: column; gap: 2px; }
  .journal-row {
    display: flex;
    gap: 10px;
    font-size: 12px;
    padding: 4px 6px;
    border-bottom: 1px solid var(--panel-border);
    cursor: pointer;
  }
  .journal-row:hover { background: #f0ead9; }
  .journal-id { color: var(--muted); font-family: monospace; }
  .journal-ts { margin-left: auto; color: var(--muted); }

  button {
    font-family: inherit;
    border: 1px solid var(--panel-border);
    background: var(--accent);
    color: #fff;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12.5px;
  }
  button:hover { filter: brightness(1.05); }

  select { padding: 5px; border-radius: 5px; border: 1px solid var(--panel-border); margin-bottom: 6px; }

  @media (max-width: 860px) {
    .layout { flex-direction: column; height: auto; }
    #game-container { justify-content: flex-start; }
    #panels-root { border-left: none; border-top: 1px solid var(--panel-border); min-height: 420px; }
  }
</style>
</head>
<body>
  <header class="banner">이 존재는 자기주도적 흥미를 시뮬레이션합니다</header>
  <div class="top-bar">
    <div id="status-bar">상태를 불러오는 중…</div>
    <div id="conn-status">연결 중…</div>
  </div>
  <div class="layout">
    <div id="game-container"></div>
    <div id="panels-root"></div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
