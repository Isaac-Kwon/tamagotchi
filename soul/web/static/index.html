<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>영혼 다마고치</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
.soul-app{
  /* ===== 디자인 토큰 (라이트) ===== */
  --bg:#eae3d3; --bg-deep:#e0d6c1; --panel:#fbf8f0; --panel-2:#f2ecdd; --panel-3:#eee7d5;
  --ink:#2d271d; --ink-soft:#6f6653; --ink-faint:#9a8f77; --line:#d9cfb8; --line-soft:#e6ddc9;
  --accent:oklch(0.55 0.07 145); --accent-ink:oklch(0.38 0.07 145); --accent-soft:oklch(0.93 0.03 145);
  --warn:oklch(0.55 0.09 60); --warn-soft:oklch(0.93 0.04 80);
  /* 결정 4종 — 동일 명도/채도, 색상만 다름 (서열 없음) */
  --d-deepen:oklch(0.62 0.09 230); --d-new:oklch(0.62 0.09 130); --d-shelve:oklch(0.62 0.09 310); --d-abandon:oklch(0.62 0.09 30);
  --d-deepen-soft:oklch(0.93 0.03 230); --d-new-soft:oklch(0.93 0.03 130); --d-shelve-soft:oklch(0.93 0.03 310); --d-abandon-soft:oklch(0.93 0.03 30);
  /* 기분 8종 — 동일 채도 */
  --m-calm:oklch(0.75 0.07 200); --m-curious:oklch(0.75 0.07 140); --m-excited:oklch(0.75 0.07 60); --m-serene:oklch(0.75 0.07 230);
  --m-bored:oklch(0.75 0.04 90); --m-frustrated:oklch(0.72 0.07 25); --m-tired:oklch(0.72 0.05 290); --m-proud:oklch(0.75 0.07 110);
  --radius:12px; --radius-sm:8px; --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px;
  --fs-xs:11.5px; --fs-sm:13px; --fs-md:14.5px; --fs-lg:17px; --fs-xl:22px;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --shadow:0 1px 2px rgba(60,50,30,.06),0 4px 14px rgba(60,50,30,.07);
}
.soul-app[data-theme="dark"]{
  --bg:#211c13; --bg-deep:#1a1610; --panel:#2b2519; --panel-2:#322b1e; --panel-3:#382f21;
  --ink:#ece3cf; --ink-soft:#b0a488; --ink-faint:#847a62; --line:#463c28; --line-soft:#3a3222;
  --accent:oklch(0.72 0.08 145); --accent-ink:oklch(0.8 0.08 145); --accent-soft:oklch(0.32 0.04 145);
  --warn:oklch(0.72 0.1 60); --warn-soft:oklch(0.32 0.05 80);
  --d-deepen:oklch(0.7 0.09 230); --d-new:oklch(0.7 0.09 130); --d-shelve:oklch(0.7 0.09 310); --d-abandon:oklch(0.7 0.09 30);
  --d-deepen-soft:oklch(0.32 0.04 230); --d-new-soft:oklch(0.32 0.04 130); --d-shelve-soft:oklch(0.32 0.04 310); --d-abandon-soft:oklch(0.32 0.04 30);
  --shadow:0 1px 2px rgba(0,0,0,.25),0 4px 14px rgba(0,0,0,.25);
}
html,body{margin:0;padding:0}
.soul-app a{color:var(--accent-ink);text-decoration:none}
.soul-app a:hover{color:var(--accent);text-decoration:underline}
.soul-app{word-break:keep-all}
.soul-app button{font-family:inherit;cursor:pointer;white-space:nowrap}
.soul-app .chip{white-space:nowrap}
.soul-app ::-webkit-scrollbar{width:10px;height:10px}
.soul-app ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:2px solid transparent;background-clip:content-box}
@keyframes soulPulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes soulBlink{0%,100%{opacity:.9}50%{opacity:.5}}
/* Panel-column chrome. panels.js styles its own interior with inline tokens /
   an injected stylesheet; it only relies on this class + .chip + the tokens. */
.panel-col{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
/* Phaser canvas fills the aspect-ratio room box (main.js sets Scale.FIT). */
#game-container{position:absolute;inset:0}
#game-container canvas{width:100%!important;height:100%!important;image-rendering:pixelated}
@media (max-width:1180px){
  .honesty-text{display:none !important}
}
@media (max-width:860px){
  .layout-main{display:flex !important;flex-direction:column !important;height:auto !important;overflow:visible !important}
  .room-col{max-width:none !important}
  .panel-col{min-height:70vh}
  .topbar-thread{display:none !important}
}
</style>
</head>
<body>
<div class="soul-app" id="soul-app" data-theme="light" style="min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;font-size:var(--fs-md);line-height:1.55;display:flex;flex-direction:column">

  <!-- ===== 상단 바 (main.js fills the dynamic parts by id) ===== -->
  <header style="display:flex;align-items:center;gap:var(--sp-3);padding:10px var(--sp-4);min-height:54px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;box-sizing:border-box;min-width:0">
    <div style="display:flex;align-items:center;gap:var(--sp-2);flex-shrink:0">
      <div style="width:26px;height:26px;border-radius:8px;background:var(--accent-soft);border:1px solid var(--line);display:grid;place-items:center;font-size:13px">◕</div>
      <strong class="chip" style="font-size:var(--fs-lg);letter-spacing:-.01em">영혼 다마고치</strong>
      <span class="chip" style="font-family:var(--mono);font-size:var(--fs-xs);color:var(--ink-faint)">soul-01</span>
    </div>
    <div style="display:flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-sm);min-width:0;flex:1;overflow:hidden">
      <span id="status-chip" class="chip" style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--line-soft);flex-shrink:0">
        <span id="status-dot" style="width:7px;height:7px;border-radius:50%;background:currentColor;animation:soulPulse 2.2s infinite"></span><span id="status-label">상태 불러오는 중</span>
      </span>
      <span id="topbar-thread" class="topbar-thread" style="color:var(--ink-soft);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <span id="next-wake" class="chip" style="color:var(--ink-soft);flex-shrink:0"></span>
    </div>
    <div style="display:flex;align-items:center;gap:var(--sp-3);flex-shrink:0">
      <button id="btn-config" title="설정 보기" style="display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--line-soft);border-radius:999px;padding:3px 10px;color:var(--ink-soft);font-size:var(--fs-xs)">⚙ 설정</button>
      <button id="btn-honesty" title="이 존재는 자기주도적 흥미를 시뮬레이션합니다 — 자세히 보기" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:4px 2px;color:var(--ink-soft);font-size:var(--fs-xs)">
        <span style="width:15px;height:15px;border-radius:50%;border:1px solid var(--ink-faint);display:inline-grid;place-items:center;font-size:10px;font-style:italic;font-family:Georgia,serif;flex-shrink:0">i</span>
        <span class="honesty-text">이 존재는 자기주도적 흥미를 시뮬레이션합니다</span>
      </button>
      <span id="conn-chip" class="chip" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:var(--fs-xs);color:var(--ink-faint);padding:3px 8px;border:1px solid var(--line-soft);border-radius:999px"><span id="conn-dot" style="width:7px;height:7px;border-radius:50%;background:oklch(0.65 0.15 145);flex-shrink:0"></span><span id="conn-label">연결 중…</span></span>
      <button id="btn-theme" title="테마 전환" style="width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-soft);font-size:13px;flex-shrink:0">☾</button>
    </div>
  </header>

  <!-- ===== 팝오버 (설정 / 정직한 프레이밍) — 기본 숨김, main.js가 토글 ===== -->
  <div style="position:relative;z-index:20">
    <div id="popover-config" style="display:none;position:absolute;top:6px;right:16px;width:360px;max-height:70vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:var(--sp-4);font-size:var(--fs-sm)">
      <strong style="display:block;margin-bottom:10px">설정 (읽기 전용)</strong>
      <div id="config-body"></div>
      <button id="config-close" style="display:block;margin-top:12px;background:none;border:none;color:var(--accent-ink);padding:0;font-size:var(--fs-sm)">닫기</button>
    </div>
    <div id="popover-honesty" style="display:none;position:absolute;top:6px;right:16px;width:340px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:var(--sp-4);font-size:var(--fs-sm);color:var(--ink-soft)">
      <strong style="color:var(--ink);display:block;margin-bottom:6px">정직한 프레이밍에 대하여</strong>
      이 에이전트에게 "진짜 영혼"이 있는 것은 아닙니다. 30분마다 스스로 행동을 고르고, 흥미를 평가하고, 주제를 이어가거나 놓아주는 <em>자기주도적 흥미의 시뮬레이션</em>입니다. 이 창은 그 누적을 관찰하기 위한 것입니다.
      <button id="honesty-close" style="display:block;margin-top:10px;background:none;border:none;color:var(--accent-ink);padding:0;font-size:var(--fs-sm)">닫기</button>
    </div>
  </div>

  <!-- ===== 본문 ===== -->
  <div class="layout-main" style="display:grid;grid-template-columns:minmax(400px,46%) minmax(0,1fr);gap:var(--sp-4);padding:var(--sp-4);flex:1;min-height:0;height:calc(100vh - 54px);overflow:hidden;box-sizing:border-box">

    <!-- 방 컬럼 -->
    <div class="room-col" style="display:flex;flex-direction:column;gap:var(--sp-3);min-width:0;overflow-y:auto;scrollbar-gutter:stable">
      <div style="position:relative;padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)">
        <!-- aspect-ratio 960/600 inner box; Phaser mounts into #game-container and
             fills it. main.js sets #room-inner filter:grayscale(...) when stale. -->
        <div id="room-inner" style="position:relative;aspect-ratio:960/600;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:repeating-linear-gradient(45deg,var(--panel-2) 0 14px,var(--panel-3) 14px 28px)">
          <div id="game-container"></div>
        </div>
        <div style="display:flex;justify-content:center;margin-top:8px">
          <span style="font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--ink-faint);border:1px solid var(--line);border-radius:4px;padding:2px 10px;background:var(--panel)">TERRARIUM · SOUL-01</span>
        </div>
      </div>

      <!-- 방 아래 상태 카드 — main.js render()가 last_step / stale로 채움 -->
      <div id="status-card" style="background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);padding:var(--sp-4);box-shadow:var(--shadow)"></div>
    </div>

    <!-- 패널 컬럼 — panels.js가 탭바+11패널을 내부에 그림 -->
    <div id="panels-root" class="panel-col"></div>
  </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
