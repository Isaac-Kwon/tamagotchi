<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>영혼 다마고치</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #efe7d8;
    --panel-bg: #fffdf8;
    --panel-border: #d8cbb0;
    --ink: #2b2620;
    --muted: #7a7160;
    --accent: #6c8ebf;
    --accent-warn: #b23b3b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  header.banner {
    background: #3a3226;
    color: #f3ead9;
    padding: 8px 16px;
    font-size: 13px;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--panel-border);
    font-size: 13px;
    color: var(--muted);
    gap: 12px;
    flex-wrap: wrap;
  }

  #status-bar { flex: 1; min-width: 200px; }
  #conn-status { white-space: nowrap; }

  .layout {
    display: flex;
    height: calc(100vh - 88px);
    min-height: 480px;
  }

  #game-container {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12px;
    overflow: auto;
    background: var(--bg);
  }

  #panels-root {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-width: 320px;
    border-left: 1px solid var(--panel-border);
    background: var(--panel-bg);
    overflow: hidden;
  }

  .panel-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 6px 6px 0 6px;
    border-bottom: 1px solid var(--panel-border);
    background: #f6f0e2;
  }

  .panel-tab {
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    padding: 6px 10px;
    font-size: 12.5px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    color: var(--muted);
  }
  .panel-tab.active {
    background: var(--panel-bg);
    border-color: var(--panel-border);
    color: var(--ink);
    font-weight: 600;
  }

  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }

  .panel-section { display: none; }
  .panel-section.active { display: block; }

  .panel-section h3 { margin: 14px 0 6px; font-size: 14px; }
  .panel-section h3:first-child { margin-top: 0; }
  .panel-section h4 { margin: 10px 0 4px; font-size: 13px; }

  .panel-note {
    font-size: 12.5px;
    color: var(--muted);
    background: #f6f0e2;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 8px 10px;
    margin: 6px 0;
  }

  .panel-empty {
    font-size: 12.5px;
    color: var(--muted);
    font-style: italic;
    padding: 8px 0;
  }

  pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-family: "Consolas", "Menlo", monospace;
    font-size: 12px;
    background: #faf6ec;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 10px;
    max-height: 320px;
    overflow-y: auto;
  }

  .soul-history { display: flex; flex-direction: column; gap: 4px; }
  .soul-commit {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    padding: 5px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    cursor: pointer;
    background: #fff;
  }
  .soul-commit:hover { background: #f0ead9; }
  .soul-commit-msg { flex: 1; }
  .soul-commit-ts { color: var(--muted); white-space: nowrap; }

  .sub-tabs { display: flex; gap: 6px; margin: 8px 0; }
  .sub-tab {
    border: 1px solid var(--panel-border);
    background: #fff;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 5px;
    cursor: pointer;
  }
  .sub-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .step-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--muted); }

  .transcript-entry {
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .transcript-role {
    background: #f0ead9;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    color: var(--muted);
  }
  .transcript-content { margin: 0; border: none; border-radius: 0; max-height: 200px; }

  .wiki-search-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .wiki-search-input { flex: 1; padding: 5px 8px; border: 1px solid var(--panel-border); border-radius: 5px; }
  .wiki-results { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .wiki-result-row {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 6px 8px;
    cursor: pointer;
    background: #fff;
    font-size: 12.5px;
  }
  .wiki-result-row:hover { background: #f0ead9; }
  .wiki-result-title { font-weight: 600; }
  .wiki-result-snippet { color: var(--muted); font-size: 11.5px; }
  .wiki-graph-toggle {
    border: 1px solid var(--panel-border);
    background: #fff;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .wiki-graph-canvas { border: 1px solid var(--panel-border); border-radius: 6px; background: #fff; margin-bottom: 10px; max-width: 100%; }
  .wiki-page-content { max-height: 260px; }
  .wiki-backlinks-label { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .wiki-backlinks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .wiki-backlink {
    background: #eef2fa;
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11.5px;
    cursor: pointer;
  }

  .report-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .report-row {
    border: 1px solid var(--panel-border);
    background: #fff;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12.5px;
  }
  .report-row:hover { background: #f0ead9; }

  .chat-record-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-top: 4px; }
  .chat-record-hint { font-size: 11.5px; color: var(--muted); margin: 4px 0 10px; }
  .chat-log {
    height: 220px;
    overflow-y: auto;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    background: #fff;
    padding: 8px;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .chat-line { margin-bottom: 6px; }
  .chat-line-me { color: var(--ink); }
  .chat-line-them { color: var(--accent); }
  .chat-input-row { display: flex; gap: 6px; }
  .chat-input { flex: 1; padding: 6px 8px; border: 1px solid var(--panel-border); border-radius: 5px; }
  .chat-end-btn { background: #f6e0e0; }

  .inbox-content, .inbox-url {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    margin: 6px 0;
    font-family: inherit;
  }

  .revealed-note {
    font-size: 12.5px;
    background: #f6f0e2;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .revealed-thread {
    display: flex;
    gap: 12px;
    font-size: 12.5px;
    padding: 6px 8px;
    border-bottom: 1px solid var(--panel-border);
  }
  .revealed-thread-topic { flex: 1; font-weight: 600; }

  .journal-list { display: flex; flex-direction: column; gap: 2px; }
  .journal-row {
    display: flex;
    gap: 10px;
    font-size: 12px;
    padding: 4px 6px;
    border-bottom: 1px solid var(--panel-border);
    cursor: pointer;
  }
  .journal-row:hover { background: #f0ead9; }
  .journal-id { color: var(--muted); font-family: monospace; }
  .journal-ts { margin-left: auto; color: var(--muted); }

  button {
    font-family: inherit;
    border: 1px solid var(--panel-border);
    background: var(--accent);
    color: #fff;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12.5px;
  }
  button:hover { filter: brightness(1.05); }

  select { padding: 5px; border-radius: 5px; border: 1px solid var(--panel-border); margin-bottom: 6px; }

  @media (max-width: 860px) {
    .layout { flex-direction: column; height: auto; }
    #game-container { justify-content: flex-start; }
    #panels-root { border-left: none; border-top: 1px solid var(--panel-border); min-height: 420px; }
  }
</style>
</head>
<body>
  <header class="banner">이 존재는 자기주도적 흥미를 시뮬레이션합니다</header>
  <div class="top-bar">
    <div id="status-bar">상태를 불러오는 중…</div>
    <div id="conn-status">연결 중…</div>
  </div>
  <div class="layout">
    <div id="game-container"></div>
    <div id="panels-root"></div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
